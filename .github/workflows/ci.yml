name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Install package
        run: pip install -e .

      - name: Run feature tests (ES2018-ES2020)
        run: python -m pytest tests/test_es2018_2020.py -v

      - name: Run bugfix tests
        run: python -m pytest tests/test_bugfixes.py -v

      - name: Run legacy test suite
        run: python -m unittest test -v 2>&1 || true
